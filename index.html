<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧺 냉장고를 부탁해 : 자취생편 | 쉽고 귀여운 오늘 한 끼 레시피</title>
  <meta name="description" content="냉장고에 남은 음식 재료들을 선택해 아기자기한 감성으로 나만의 맞춤형 요리를 추천받으세요! 자취생 최적화 레시피 서비스.">
  <meta name="keywords" content="냉장고를 부탁해, 자취생 요리, 남은 재료 요리, 혼밥, 간편 레시피">
  <!-- Google Fonts: Gaegu (cute handwriting) and Gowun Dodum (neat rounded font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo" id="btn-logo" data-nav="home">
        <span class="logo-emoji">
          <svg class="fridge-icon" viewBox="0 0 100 120" width="30" height="36" style="display: block;">
            <!-- Fridge Body -->
            <rect x="15" y="10" width="70" height="100" rx="15" ry="15" fill="#78C0A8" stroke="#4A3E3D" stroke-width="6" />
            <!-- Freezer / Refrigerator Separator -->
            <line x1="15" y1="42" x2="85" y2="42" stroke="#4A3E3D" stroke-width="6" stroke-linecap="round" />
            <!-- Handles -->
            <rect x="70" y="20" width="6" height="15" rx="3" ry="3" fill="#FAF4E8" stroke="#4A3E3D" stroke-width="4" />
            <rect x="70" y="52" width="6" height="35" rx="3" ry="3" fill="#FAF4E8" stroke="#4A3E3D" stroke-width="4" />
            <!-- Cute Sticky Note on Freezer Door -->
            <rect x="30" y="20" width="18" height="14" rx="2" ry="2" fill="#FFFDE7" stroke="#4A3E3D" stroke-width="3" transform="rotate(-6 39 27)" />
            <!-- Cute smiley face on fridge door -->
            <circle cx="35" cy="65" r="3" fill="#4A3E3D" />
            <circle cx="55" cy="65" r="3" fill="#4A3E3D" />
            <path d="M41,72 Q45,76 49,72" stroke="#4A3E3D" stroke-width="3" stroke-linecap="round" fill="none" />
            <!-- Fridge Legs -->
            <rect x="25" y="108" width="10" height="8" rx="2" ry="2" fill="#4A3E3D" />
            <rect x="65" y="108" width="10" height="8" rx="2" ry="2" fill="#4A3E3D" />
          </svg>
        </span>
        <div class="logo-title">
          <span class="logo-main">냉장고를 부탁해</span>
          <span class="logo-sub">자취생편</span>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-btn active" id="nav-home" data-nav="home">🏠 시작</button>
        <button class="nav-btn" id="nav-fridge" data-nav="fridge">🧺 내 냉장고</button>
        <button class="nav-btn" id="nav-recipes" data-nav="recipes">🍳 추천 레시피</button>
        <button class="nav-btn" id="nav-book" data-nav="book">📖 요리 도감</button>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="메뉴 열기">🌳</button>
    </div>
  </header>


  <main id="app"></main>

  <div id="toast" class="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
