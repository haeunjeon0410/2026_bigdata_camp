<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냉장고를 부탁해 : 자취생편 | 쉽고 귀여운 오늘 한 끼 레시피</title>
  <meta name="description" content="냉장고에 남은 음식 재료들을 선택해 아기자기한 감성으로 나만의 맞춤형 요리를 추천받으세요! 자취생 최적화 레시피 서비스.">
  <meta name="keywords" content="냉장고를 부탁해, 자취생 요리, 남은 재료 요리, 혼밥, 간편 레시피">
  <!-- Google Fonts: Gaegu (cute handwriting) and Gowun Dodum (neat rounded font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo" id="btn-logo" data-nav="home">
        <span class="logo-emoji">
          <svg class="fridge-icon" viewBox="0 0 100 120" width="30" height="36" style="display: block;">
            <!-- Fridge Body -->
            <rect x="15" y="10" width="70" height="100" rx="15" ry="15" fill="#78C0A8" stroke="#4A3E3D" stroke-width="6" />
            <!-- Freezer / Refrigerator Separator -->
            <line x1="15" y1="42" x2="85" y2="42" stroke="#4A3E3D" stroke-width="6" stroke-linecap="round" />
            <!-- Handles -->
            <rect x="70" y="20" width="6" height="15" rx="3" ry="3" fill="#FAF4E8" stroke="#4A3E3D" stroke-width="4" />
            <rect x="70" y="52" width="6" height="35" rx="3" ry="3" fill="#FAF4E8" stroke="#4A3E3D" stroke-width="4" />
            <!-- Cute Sticky Note on Freezer Door -->
            <rect x="30" y="20" width="18" height="14" rx="2" ry="2" fill="#FFFDE7" stroke="#4A3E3D" stroke-width="3" transform="rotate(-6 39 27)" />
            <!-- Cute smiley face on fridge door -->
            <circle cx="35" cy="65" r="3" fill="#4A3E3D" />
            <circle cx="55" cy="65" r="3" fill="#4A3E3D" />
            <path d="M41,72 Q45,76 49,72" stroke="#4A3E3D" stroke-width="3" stroke-linecap="round" fill="none" />
            <!-- Fridge Legs -->
            <rect x="25" y="108" width="10" height="8" rx="2" ry="2" fill="#4A3E3D" />
            <rect x="65" y="108" width="10" height="8" rx="2" ry="2" fill="#4A3E3D" />
          </svg>
        </span>
        <div class="logo-title">
          <span class="logo-main">냉장고를 부탁해</span>
          <span class="logo-sub">자취생편</span>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-btn active" id="nav-home" data-nav="home">홈</button>
        <button class="nav-btn" id="nav-fridge" data-nav="fridge">내 냉장고</button>
        <button class="nav-btn" id="nav-recipes" data-nav="recipes">레시피</button>
        <button class="nav-btn" id="nav-mypage" data-nav="mypage">마이페이지</button>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="메뉴 열기">🌳</button>
    </div>
  </header>


  <main id="app"></main>

  <div id="toast" class="toast"></div>

  <!-- ❤️ 취향 및 상황 선택 모달 UI (기본 숨김 상태) -->
  <div id="taste-modal" class="custom-modal-overlay">
    <div class="custom-modal-content taste-modal-content">
      <h3 class="modal-title" style="font-size: 22px; margin-bottom: 8px;">취향 및 상황 선택</h3>
      <p class="modal-subtitle" style="font-size: 13px; color: var(--color-gray); margin-bottom: 24px; word-break: keep-all;">
        추천을 더 정확하게 하기 위해 원하는 옵션을 선택해주세요.<br/>(선택 사항)
      </p>

      <div class="taste-section">
        <h4 class="taste-section-title">취향</h4>
        <div class="chip-container">
          <button class="chip-btn">🌶️ 매운 음식</button>
          <button class="chip-btn">🥗 다이어트</button>
          <button class="chip-btn">🍖 고단백</button>
          <button class="chip-btn">🍜 국물요리</button>
          <button class="chip-btn">🍚 밥요리</button>
          <button class="chip-btn">🍝 면요리</button>
          <button class="chip-btn">🍰 간식</button>
          <button class="chip-btn">⚡ 간단한 요리</button>
          <button class="chip-btn">🥘 한식</button>
          <button class="chip-btn">🍕 양식</button>
        </div>
      </div>
      
      <div class="taste-section" style="margin-top: 20px; margin-bottom: 25px;">
        <h4 class="taste-section-title">상황</h4>
        <div class="chip-container">
          <button class="chip-btn">⏰ 10분 안에</button>
          <button class="chip-btn">🏠 혼밥</button>
          <button class="chip-btn">🥶 냉장고 털이</button>
          <button class="chip-btn">🍺 술안주</button>
          <button class="chip-btn">👥 손님용</button>
          <button class="chip-btn">🍱 도시락</button>
        </div>
      </div>

      <div class="taste-section" data-cuisine-filter="true" style="margin-top: 20px; margin-bottom: 30px;">
        <h4 class="taste-section-title">요리 종류</h4>
        <div class="chip-container">
          <button type="button" class="chip-btn" data-cuisine="한식">한식</button>
          <button type="button" class="chip-btn" data-cuisine="양식">양식</button>
          <button type="button" class="chip-btn" data-cuisine="일식">일식</button>
          <button type="button" class="chip-btn" data-cuisine="중식">중식</button>
        </div>
      </div>
      
      <div class="modal-actions" style="display: flex; gap: 12px; justify-content: center; width: 100%;">
        <button class="btn btn-outline btn-taste-close" style="flex: 1; padding: 10px; font-size: 14px;">건너뛰기</button>
        <button class="btn btn-primary btn-taste-suggest" style="flex: 1; padding: 10px; font-size: 14px;">추천받기</button>
      </div>
    </div>
  </div>

  <!-- 🛒 장바구니 리스트 모달 UI -->
  <div id="shopping-modal" class="custom-modal-overlay">
    <div class="custom-modal-content" style="max-width: 450px; width: 90%; padding: 30px; border: var(--border-thick); border-radius: var(--br-lg); box-shadow: 0 8px 0 var(--color-charcoal); position: relative;">

      <!-- 씩씩하게 장보는 뽀짝 토끼 배치 -->
      <div class="shopping-modal-bunny-wrap">
        <img src="shop.png" class="shopping-modal-bunny" alt="장보기 토끼" />
      </div>

      <button class="modal-close" id="btn-shopping-modal-close" style="position: absolute; right: 20px; top: 15px; background: none; border: none; font-size: 20px; font-weight: bold; cursor: pointer; color: var(--color-charcoal);">✖</button>
      <h3 class="modal-title" style="font-size: 22px; margin-bottom: 8px;">장보기 리스트</h3>
      <p class="modal-subtitle" style="font-size: 13px; color: var(--color-gray); margin-bottom: 20px;">부족해서 담아둔 재료의 체크리스트입니다.</p>
      
      <ul class="shopping-checklist">
        <!-- 동적으로 부족한 식재료 체크리스트가 주입될 공간입니다. -->
        <li class="shopping-item-empty" style="text-align:center; padding: 25px 0; color: var(--color-gray); font-family: var(--font-hand); font-size: 17px; list-style: none;">
          장바구니가 비어 있습니다 🛒
        </li>
      </ul>
      
      <div class="modal-actions" style="margin-top: 25px; display: flex; justify-content: center; width: 100%;">
        <button class="btn btn-primary" id="btn-shopping-modal-done" style="width: 100%; padding: 10px; font-size: 14px;">장보기 완료</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>

</html>
