<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레시피 상세 | 냉장고를 부탁해</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header"><div class="container header-inner"><a class="site-logo" href="../index.html">냉장고를 부탁해</a><p class="site-subtitle">자취생편</p></div></header>
  <nav class="site-navigation" aria-label="주요 메뉴"><div class="container nav-inner">
    <a href="../index.html">Home</a><a href="refrigerator.html">내 냉장고</a><a href="recommend.html">추천 레시피</a><a href="detail.html" aria-current="page">레시피 상세</a><a href="favorite.html">⭐ 즐겨찾기</a>
  </div></nav>

  <main class="container main-content">
    <section id="recipe-detail-section" class="section">
      <div id="recipe-title-area" class="section-header"><h1 id="recipe-title">요리명</h1></div>
      <div id="recipe-image" class="detail-image-placeholder">이미지 자리</div>
      <div id="recipe-summary" class="card"><p id="cooking-time">조리시간: -</p><p id="difficulty">난이도: -</p></div>
    </section>

    <section id="required-ingredients-section" class="section">
      <div class="section-header"><h2>필요 재료</h2></div>
      <div id="required-ingredients" class="placeholder">필요 재료가 표시될 영역</div>
    </section>

    <section id="cooking-steps-section" class="section">
      <div class="section-header"><h2>조리순서</h2></div>
      <ol id="cooking-steps" class="placeholder"><li>조리순서가 표시될 영역</li></ol>
    </section>

    <section id="detail-actions-section" class="section">
      <button id="favorite-button" class="button" type="button">⭐ 즐겨찾기</button>
      <button id="shopping-list-button" class="button secondary" type="button">장보기 목록에 추가</button>
    </section>
  </main>
  <script src="../js/main.js"></script>
</body>
</html>
